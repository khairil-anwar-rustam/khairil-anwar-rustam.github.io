<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khairil Anwar | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1220;
  --card:rgba(255,255,255,0.05);
  --accent:#38bdf8;
  --text:#e5e7eb;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter,sans-serif;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(56,189,248,0.18), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(99,102,241,0.15), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(16,185,129,0.10), transparent 50%);
  z-index:-2;
  animation:moveBg 18s ease-in-out infinite alternate;
}

@keyframes moveBg{
  0%{transform:scale(1) translateY(0);}
  100%{transform:scale(1.1) translateY(-20px);}
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(14px);
  z-index:100;
}

nav a{
  color:var(--muted);
  margin-left:15px;
  text-decoration:none;
  font-size:13px;
}

nav a:hover{color:var(--accent);}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px 40px;
}

.hero img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:2px solid var(--accent);
}

/* SECTIONS */
.section{
  max-width:1000px;
  margin:auto;
  padding:50px 20px;
}

.section h2{
  border-left:4px solid var(--accent);
  padding-left:10px;
  margin-bottom:20px;
  cursor:pointer;
}

/* CARDS */
.card{
  background:var(--card);
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:12px;
  cursor:pointer;
  backdrop-filter:blur(10px);
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:999;
}

.modal-content{
  max-width:900px;
  width:100%;
  background:#0b1220;
  padding:20px;
  border-radius:12px;
  position:relative;
  max-height:90vh;
  overflow-y:auto;
}

.close{
  position:absolute;
  top:10px;
  right:15px;
  cursor:pointer;
  font-size:18px;
}

/* SLIDER */
.slider-box{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-top:15px;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:14px;
  border-radius:50%;
  color:white;
  text-decoration:none;
  font-size:20px;
  z-index:999;
}

/* REPORT */
.report{
  margin-top:15px;
  display:none;
  border-top:1px solid rgba(255,255,255,0.1);
  padding-top:15px;
}

/* BUTTON */
button{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* =========================
   🔥 SMOOTH IMAGE LOADING
========================= */
img{
  opacity:0;
  transform:scale(1.02);
  filter:blur(8px);
  transition:opacity 0.6s ease, transform 0.6s ease, filter 0.6s ease;
}

img.loaded{
  opacity:1;
  transform:scale(1);
  filter:blur(0);
}

</style>
</head>

<body>

<nav>
<div>Portfolio</div>
<div>
<a href="#about">About</a>
<a href="#cases">Cases</a>
<a href="#cert">Certs</a>
<a href="#social">Activities</a>
</div>
</nav>

<section class="hero">
<img src="profile.jpg" loading="lazy">
<h1>Khairil Anwar</h1>
<p>Hardware • Network • Software • IoT • DIY</p>
</section>

<section id="about" class="section">
<h2>About Me</h2>
<div class="card">
Tech-savvy personnel focused on IT, networking, software systems & IoT solutions.
</div>
</section>

<section id="cases" class="section">
<h2 onclick="toggleSection(this)">Case Studies</h2>
<div class="section-content">
<div id="cases-container"></div>
</div>
</section>

<section id="cert" class="section">
<h2>Certificates</h2>
<div class="card" onclick="openCert('Certs/Diploma.jpg')">Diploma</div>
<div class="card" onclick="openCert('Certs/Bachelor.jpg')">Bachelor</div>
<div class="card" onclick="openCert('Certs/Master.jpg')">Master</div>
</section>

<section id="social" class="section">
<h2 onclick="toggleSection(this)">Activities</h2>
<div class="section-content">
<div id="social-container"></div>
</div>
</section>

<!-- MODAL -->
<div id="modal" class="modal" onclick="outsideClose(event)">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modal-body"></div>
</div>
</div>

<div id="certModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeCert()">✖</span>
<img id="certImage">
</div>
</div>

<a class="whatsapp" href="https://wa.me/60134570863" target="_blank">💬</a>

<script>

/* ======================
   DATA (shortened)
====================== */

const cases = [{
name:"Network Issue",
problem:"Internet drop",
before:"img/b2.jpg",
after:"img/a2.jpg",
steps:["Check switch","Replace cable"],
tools:"Tester",
impact:"Stable network"
}];

const activities = [{
name:"Project Deployment",
desc:"AV System",
story:"Installed projector",
impact:"Better learning",
gallery:["Activities/1.jpg","Activities/2.jpg"]
}];

/* ======================
   RENDER
====================== */

function renderCases(){
const c=document.getElementById('cases-container');
cases.forEach(i=>{
const d=document.createElement('div');
d.className='card';
d.innerHTML=`${i.name}<br><small>${i.problem}</small>`;
d.onclick=()=>openModal(i);
c.appendChild(d);
});
smoothImages();
}

function renderActivities(){
const c=document.getElementById('social-container');
activities.forEach(a=>{
const d=document.createElement('div');
d.className='card';
d.innerHTML=`${a.name}<br><small>${a.desc}</small>`;
d.onclick=()=>openActivity(a);
c.appendChild(d);
});
smoothImages();
}

/* ======================
   MODALS
====================== */

function openModal(i){
document.getElementById('modal').style.display='flex';

document.getElementById('modal-body').innerHTML=`
<h2>${i.name}</h2>
<p>${i.problem}</p>

<div class="slider-box">
<img src="${i.before}" loading="lazy">
<img src="${i.after}" loading="lazy">
</div>

<button onclick="toggleReport()">Report</button>

<div id="report" class="report">
${i.steps.map(s=>`<li>${s}</li>`).join('')}
</div>
`;

setTimeout(smoothImages,100);
}

function openActivity(a){
document.getElementById('modal').style.display='flex';

document.getElementById('modal-body').innerHTML=`
<h2>${a.name}</h2>
<p>${a.story}</p>

<div class="gallery">
${a.gallery.map(g=>`<img src="${g}" loading="lazy">`).join('')}
</div>
`;

setTimeout(smoothImages,100);
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

function openCert(i){
document.getElementById('certImage').src=i;
document.getElementById('certModal').style.display='flex';
}

function closeCert(){
document.getElementById('certModal').style.display='none';
}

/* ======================
   REPORT
====================== */

function toggleReport(){
const r=document.getElementById('report');
if(r) r.style.display = r.style.display==='block'?'none':'block';
}

/* ======================
   IMAGE LOADING FIX
====================== */

function smoothImages(){
document.querySelectorAll("img").forEach(img=>{
if(img.complete){
img.classList.add("loaded");
}else{
img.onload=()=>img.classList.add("loaded");
}
});
}

/* ======================
   UTIL
====================== */

function toggleSection(el){
el.parentElement.classList.toggle('active');
}

function outsideClose(e){
if(e.target.id==='modal') closeModal();
}

document.addEventListener('keydown',e=>{
if(e.key==="Escape"){
closeModal();
closeCert();
}
});

/* INIT */
renderCases();
renderActivities();
setTimeout(smoothImages,100);

</script>

</body>
  </html>
