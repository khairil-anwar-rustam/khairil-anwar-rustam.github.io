<style>
:root{
--bg:#0b1220;
--card:rgba(255,255,255,0.05);
--accent:#38bdf8;
--text:#e5e7eb;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}
body{background:var(--bg);color:var(--text);}

nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:12px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
z-index:100;
}
nav a{color:var(--muted);margin-left:15px;text-decoration:none;font-size:13px;}
nav a:hover{color:var(--accent);}

.hero{text-align:center;padding:120px 20px 40px;}
.hero img{width:120px;height:120px;border-radius:50%;border:2px solid var(--accent);}
.hero h1{font-size:28px;margin-top:10px;}
.hero p{color:var(--muted);}

.section{max-width:1000px;margin:auto;padding:50px 20px;}
.section h2{border-left:4px solid var(--accent);padding-left:10px;margin-bottom:20px;}

.card{
background:var(--card);
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.08);
margin-bottom:12px;
cursor:pointer;
}

.modal,.fullscreen{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
z-index:999;
overflow:auto;
padding:20px;
}

.modal-content,.report-box{
max-width:900px;
margin:auto;
background:#0b1220;
padding:20px;
border-radius:12px;
position:relative;
}

.close{position:absolute;top:10px;right:15px;cursor:pointer;}

button{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}
.gallery img{
width:100%;
border-radius:10px;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:12px;
border-radius:50px;
color:white;
text-decoration:none;
}
</style>
</head>

let cat=0,idx=0;

/* ================= OPEN CASE ================= */

function openCase(c,i){
cat=c;idx=i;show();
document.getElementById('modal').style.display='flex';
}

function show(){
let item=cases[cat][idx];

document.getElementById('modal-body').innerHTML=`
<h2>${item.name}</h2>
<hr>
<p><b>Problem:</b> ${item.problem}</p>
<p><b>Fix:</b> ${item.fix}</p>
<p><b>Solution:</b> ${item.solution}</p>

<h4>Before / After</h4>
<div class="gallery">
<div>${item.gallery?.before?.map(i=>`<img src="${i}">`).join('')}</div>
<div>${item.gallery?.after?.map(i=>`<img src="${i}">`).join('')}</div>
</div>

<br>
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="report()">Full Report</button>
`;
}

function next(){idx=(idx+1)%cases[cat].length;show();}
function prev(){idx=(idx-1+cases[cat].length)%cases[cat].length;show();}

/* ================= REPORT ================= */

function report(){
let item=cases[cat][idx];

document.getElementById('report-body').innerHTML=`
<h2>${item.name}</h2>
<h3>Steps</h3>
<ol>${item.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
<p><b>Tools:</b> ${item.tools}</p>
<p><b>Impact:</b> ${item.impact}</p>
`;

document.getElementById('report').style.display='block';
}

function closeModal(){document.getElementById('modal').style.display='none';}
function closeReport(){document.getElementById('report').style.display='none';}

</script>
