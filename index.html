:root{
--bg:#0b1220;
--card:rgba(255,255,255,0.05);
--accent:#38bdf8;

--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}
body{background:var(--bg);color:var(--text);}

/* NAV */
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);z-index:100;}
nav a{color:var(--muted);margin-left:15px;text-decoration:none;font-size:13px;}
nav a:hover{color:var(--accent);}

/* HERO */
.hero{text-align:center;padding:120px 20px 40px;}
.hero img{width:120px;height:120px;border-radius:50%;border:2px solid var(--accent);}
.hero h1{font-size:28px;margin-top:10px;}
.hero p{color:var(--muted);}

/* SECTION */
.section{max-width:1000px;margin:auto;padding:50px 20px;}
.section h2{border-left:4px solid var(--accent);padding-left:10px;margin-bottom:20px;}

/* CARD */
.card{background:var(--card);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);margin-bottom:12px;cursor:pointer;}

/* MODAL */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:flex-start;padding:30px 15px;z-index:999;overflow:auto;}
.modal-content{max-width:900px;width:100%;background:#0b1220;padding:20px;border-radius:12px;position:relative;}
.close{position:absolute;top:10px;right:15px;cursor:pointer;font-size:20px;}

/* REPORT */
.fullscreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b1220;z-index:2000;display:none;overflow:auto;padding:20px;}
.report-box{max-width:900px;margin:auto;background:rgba(255,255,255,0.04);padding:20px;border-radius:12px;}

/* SLIDER */
.ba-slider{position:relative;width:100%;overflow:hidden;border-radius:10px;margin-top:10px;}
.ba-slider img{width:100%;display:block;}
.ba-overlay{position:absolute;top:0;left:0;width:50%;overflow:hidden;}
.ba-handle{position:absolute;top:0;left:50%;width:3px;height:100%;background:#38bdf8;cursor:ew-resize;}

/* BUTTON */
button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:white;padding:8px 12px;border-radius:8px;cursor:pointer;}
button:hover{border-color:var(--accent);}

/* WHATSAPP */
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:12px 14px;border-radius:50px;text-decoration:none;}

</style>

/* ================= SLIDER INIT ================= */
function initSliders(){
document.querySelectorAll('.ba-slider').forEach(slider=>{
let overlay = slider.querySelector('.ba-overlay');
let handle = slider.querySelector('.ba-handle');

slider.addEventListener('mousemove', e=>{
let rect = slider.getBoundingClientRect();
let x = e.clientX - rect.left;
let percent = (x / rect.width) * 100;

overlay.style.width = percent + '%';
handle.style.left = percent + '%';
});
});
}

/* ================= CASE DATA ================= */

let cases = [

/* NETWORK */

/* ================= SYSTEM ================= */

let main=0;
let index=0;

function openCase(i){
main=i;
index=0;
show();
document.getElementById('modal').style.display='flex';
}

function show(){
let c=cases[main];
let item=c.items[index];

document.getElementById('modal-body').innerHTML=`
<h2>${c.title}</h2>
<h3 style="color:#38bdf8">${item.name}</h3>
${item.content}
<br>
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
<button onclick="openReport()">📄 Full Report</button>
`;

initSliders();
}

function next(){
let c=cases[main];
index=(index+1)%c.items.length;
show();
}

function prev(){
let c=cases[main];
index=(index-1+c.items.length)%c.items.length;
show();
}

function openReport(){
let c=cases[main];
let item=c.items[index];

document.getElementById('report-body').innerHTML=`
<h1>${c.title}</h1>
<h2>${item.name}</h2>
<hr>
${item.content}
<h3>Steps</h3>${item.steps}
<h3>Tools Used</h3>${item.tools}
<h3>Impact</h3>${item.impact}
`;

initSliders();
document.getElementById('report').style.display='block';
}

function closeModal(){document.getElementById('modal').style.display='none';}
function closeReport(){document.getElementById('report').style.display='none';}

</script>
