<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khairil Anwar | Tech Problem Solver</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0b1220;
--glass:rgba(255,255,255,0.05);
--accent:#38bdf8;
--text:#e5e7eb;
--muted:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}
body{background:linear-gradient(135deg,#0b1220,#0f172a);color:var(--text);}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;
padding:12px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(12px);
z-index:100;
}
nav a{color:var(--muted);margin-left:15px;text-decoration:none;font-size:13px;}
nav a:hover{color:var(--accent);}

/* HERO */
.hero{text-align:center;padding:110px 20px 60px;}
.hero img{width:120px;height:120px;border-radius:50%;border:2px solid var(--accent);object-fit:cover;margin-bottom:15px;}
.hero h1{font-size:30px;}
.hero p{color:var(--muted);}

/* SECTION */
.section{max-width:1000px;margin:auto;padding:60px 20px;}
.section h2{border-left:4px solid var(--accent);padding-left:10px;margin-bottom:20px;}

/* CARD */
.card{
background:var(--glass);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.08);
padding:16px;border-radius:14px;margin-bottom:15px;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
z-index:999;
justify-content:center;
align-items:flex-start;
overflow:auto;
padding:30px 20px;
}

.modal-content{
max-width:900px;width:100%;
background:#0b1220;
padding:20px;
border-radius:12px;
position:relative;
}

.close{
position:absolute;
right:15px;top:10px;
cursor:pointer;
font-size:20px;
}

/* NAV */
.slider-nav{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.btn{
background:var(--accent);
color:#000;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:10px;
}

.gallery img{
width:100%;
border-radius:8px;
cursor:pointer;
}

/* ZOOM */
.zoom{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

.zoom img{
max-width:90%;
max-height:90%;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
padding:12px 14px;
border-radius:50px;
text-decoration:none;
font-size:14px;
z-index:1000;
}

footer{
text-align:center;
padding:30px;
color:var(--muted);
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>Khairil</div>
<div>
<a href="#it">IT</a>
<a href="#diy">DIY</a>
<a href="#contact">Contact</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<img src="images/profile.jpg">
<h1>Tech Problem Solver</h1>
<p>Network • Hardware • Software • DIY Engineering</p>
</section>

<!-- IT CATEGORY -->
<section id="it" class="section">
<h2>IT Case Studies</h2>

<div class="card" onclick="openCase(0)">Network</div>
<div class="card" onclick="openCase(1)">Hardware</div>
<div class="card" onclick="openCase(2)">Software / System</div>

</section>

<!-- DIY -->
<section id="diy" class="section">
<h2>DIY Projects</h2>
<div class="card" onclick="openCase(3)">DIY Engineering</div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
<h2>Contact</h2>
<div class="card">Email: karustam013@gmail.com</div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<div id="modal-body"></div>

<div class="slider-nav">
<div class="btn" onclick="prevCase()">← Prev</div>
<div class="btn" onclick="nextCase()">Next →</div>
</div>

</div>
</div>

<!-- ZOOM -->
<div id="zoom" class="zoom" onclick="this.style.display='none'">
<img id="zoom-img">
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/60134570863?text=Hi%20Khairil%2C%20I%20viewed%20your%20portfolio"
class="whatsapp" target="_blank">
💬 WhatsApp
</a>

<script>

/* ================= STRUCTURE ================= */

let cases = [

/* NETWORK */
{
title:"Network",
items:[
{
name:"Case 1 - WiFi Issue",
content:`
<p><b>Problem:</b> Weak WiFi coverage</p>
<p><b>Fix:</b> AP repositioning + tuning</p>
<p><b>Result:</b> Stable network performance</p>
<div class="gallery">
<img src="images/net1.jpg" onclick="zoom(this)">
</div>
`
},
{
name:"Case 2 - Downtime Recovery",
content:`
<p><b>Problem:</b> Intermittent network outage</p>
<p><b>Fix:</b> Switch replacement + cable tracing</p>
<p><b>Result:</b> Full recovery achieved</p>
`
}
]
},

/* HARDWARE */
{
title:"Hardware",
items:[
{
name:"Case 1 - Motherboard Issue",
content:`
<p><b>Problem:</b> System not powering ON</p>
<p><b>Fix:</b> Component-level diagnosis</p>
<p><b>Result:</b> Restored system</p>
`
},
{
name:"Case 2 - Thermal Issue",
content:`
<p><b>Problem:</b> Overheating shutdown</p>
<p><b>Fix:</b> Cooling system service</p>
<p><b>Result:</b> Stable performance</p>
`
}
]
},

/* SOFTWARE / SYSTEM */
{
title:"Software / System",
items:[
{
name:"Case 1 - System Performance Issue",
content:`
<p><b>Problem:</b> Slow system performance</p>
<p><b>Fix:</b> OS cleanup + optimization</p>
<p><b>Result:</b> Improved speed & responsiveness</p>
`
},
{
name:"Case 2 - Software Deployment Issue",
content:`
<p><b>Problem:</b> Application compatibility errors</p>
<p><b>Fix:</b> Driver + configuration fix</p>
<p><b>Result:</b> Stable deployment environment</p>
`
}
]
},

/* DIY */
{
title:"DIY Engineering",
items:[
{
name:"Case 1 - Irrigation System",
content:`
<p><b>Problem:</b> Manual watering inconsistent</p>
<p><b>Build:</b> Sensor + relay automation</p>
<p><b>Result:</b> Fully automated system</p>
<div class="gallery">
<img src="images/diy1.jpg" onclick="zoom(this)">
</div>
`
},
{
name:"Case 2 - Lighting Automation",
content:`
<p><b>Problem:</b> Energy waste from manual lights</p>
<p><b>Build:</b> Light sensor automation</p>
<p><b>Result:</b> Auto ON/OFF system</p>
`
}
]
}
];

let mainIndex=0;
let subIndex=0;

/* OPEN */
function openCase(i){
mainIndex=i;
subIndex=0;
renderCase();
document.getElementById('modal').style.display='flex';
}

/* RENDER */
function renderCase(){
let group=cases[mainIndex];
let item=group.items[subIndex];

document.getElementById('modal-body').innerHTML=`
<h2>${group.title}</h2>
<h3 style="color:#38bdf8;margin-top:5px">${item.name}</h3>
<div style="margin-top:10px">${item.content}</div>
`;
}

/* NAV */
function nextCase(){
let group=cases[mainIndex];
subIndex=(subIndex+1)%group.items.length;
renderCase();
}

function prevCase(){
let group=cases[mainIndex];
subIndex=(subIndex-1+group.items.length)%group.items.length;
renderCase();
}

/* CLOSE */
function closeModal(){
document.getElementById('modal').style.display='none';
}

/* ZOOM */
function zoom(img){
document.getElementById('zoom-img').src=img.src;
document.getElementById('zoom').style.display='flex';
}

</script>

</body>
  </html>
